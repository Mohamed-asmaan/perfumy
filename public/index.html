<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />

    <!-- Title -->
    <title>Perfumy | Premium Perfumes Online</title>

    <!-- SEO Meta -->
    <meta
      name="description"
      content="Discover premium perfumes at Perfumy. Long-lasting fragrances for men and women at affordable prices."
    />
    <meta
      name="keywords"
      content="perfume, fragrances, mens perfume, womens perfume, long lasting perfume, perfumy"
    />
    <meta name="author" content="Perfumy" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Open Graph (Facebook, LinkedIn) -->
    <meta property="og:title" content="Perfumy | Premium Perfumes Online" />
    <meta
      property="og:description"
      content="Shop premium perfumes with long-lasting fragrance. Best deals available now."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com/" />
    <meta property="og:image" content="%PUBLIC_URL%/logo192.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Perfumy | Premium Perfumes" />
    <meta
      name="twitter:description"
      content="Explore long-lasting premium perfumes at great prices."
    />
    <meta name="twitter:image" content="%PUBLIC_URL%/logo192.png" />

    <!-- Performance (optional but good) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- React Root -->
    <div id="root"></div>

  </body>
</html>
